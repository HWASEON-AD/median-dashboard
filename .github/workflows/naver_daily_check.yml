name: 네이버 노출 자동 체크 (메디안)

on:
  workflow_dispatch:       # cron-job.org에서 정확한 시간에 호출
    inputs:
      post_id:
        description: '단일 키워드 즉시체크용 post_id (비우면 전체 체크)'
        required: false
        default: ''

jobs:
  naver-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 한국어 폰트 설치
        run: sudo apt-get install -y fonts-noto-cjk

      - name: 의존성 설치
        run: pip install -r scripts/requirements_check.txt

      - name: 노출 체크 실행
        env:
          SUPABASE_URL: https://kepzsboxjulzygehmzpf.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ inputs.post_id }}" ]; then
            python scripts/naver_check.py --post-id "${{ inputs.post_id }}"
          else
            python scripts/naver_check.py
          fi

      - name: 캡처 이미지 Artifact 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captures-${{ github.run_id }}
          path: captures/
          retention-days: 30
          if-no-files-found: ignore
